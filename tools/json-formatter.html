<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header"><div class="container header-inner"><a href="../" class="logo"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FreeTools</span></a><div class="header-actions"><div class="lang-switcher"><button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button><div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div></div></div></div></header>
<main class="tool-page">
    <div class="tool-header"><h1>JSON Formatter</h1><p>Format, validate, and beautify JSON data</p></div>
    <div class="tool-container">
        <div class="tool-panel"><label>Input JSON</label><textarea id="jsonInput" placeholder='{"key": "value", "array": [1, 2, 3]}'></textarea></div>
        <div class="tool-panel">
            <div class="btn-group"><button class="btn btn-primary" onclick="format()">Format (Pretty Print)</button><button class="btn btn-primary" onclick="minify()">Minify</button><button class="btn btn-primary" onclick="validate()">Validate</button></div>
        </div>
        <div class="tool-panel"><label>Output</label><div class="output-area" id="output"></div><div class="btn-group"><button class="btn btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById('output').textContent)">Copy</button></div></div>
    </div>
</main>
<script src="../js/app.js"></script>
<script>
function format() {
    try {
        const obj = JSON.parse(document.getElementById('jsonInput').value);
        document.getElementById('output').textContent = JSON.stringify(obj, null, 2);
    } catch(e) { document.getElementById('output').textContent = 'Error: ' + e.message; }
}
function minify() {
    try {
        const obj = JSON.parse(document.getElementById('jsonInput').value);
        document.getElementById('output').textContent = JSON.stringify(obj);
    } catch(e) { document.getElementById('output').textContent = 'Error: ' + e.message; }
}
function validate() {
    try { JSON.parse(document.getElementById('jsonInput').value); document.getElementById('output').textContent = 'Valid JSON ✓'; } 
    catch(e) { document.getElementById('output').textContent = 'Invalid JSON: ' + e.message; }
}
</script>
</body>
</html>
