<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Hash Generator Online — MD5, SHA-1, SHA-256 | FreeTools</title>
    <meta name="description" content="Free online hash generator. Generate MD5, SHA-1, SHA-256 hashes instantly. Developer tool.">
    <meta name="keywords" content="hash generator, MD5 generator, SHA-256 generator, SHA-1 hash, online hash tool, checksum generator, hash calculator, string hash">
    <meta property="og:title" content="Free Hash Generator — MD5, SHA-1, SHA-256">
    <meta property="og:description" content="Generate MD5, SHA-1, SHA-256 hashes instantly.">
    <meta property="og:url" content="https://erste1.github.io/freetools/tools/hash-generator.html">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header"><div class="container header-inner"><a href="../" class="logo"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FreeTools</span></a><div class="header-actions"><div class="lang-switcher"><button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button><div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div></div></div></div></header>
<main class="tool-page">
    <div class="tool-header"><h1>Hash Generator</h1><p>Generate MD5, SHA-1, SHA-256 hashes</p></div>
    <div class="tool-container">
        <div class="tool-panel"><label>Input Text</label><textarea id="input" placeholder="Enter text to hash..."></textarea></div>
        <div class="tool-panel"><div class="btn-group"><button class="btn btn-primary" onclick="generateHashes()">Generate Hashes</button></div></div>
        <div class="tool-panel">
            <label>Results</label>
            <div style="display:grid;gap:12px">
                <div style="padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:600;font-size:13px;color:var(--text-secondary)">SHA-256</span>
                    <code id="sha256" style="font-size:12px;word-break:break-all;max-width:500px"></code>
                    <button class="btn btn-secondary" onclick="copyHash('sha256')" style="padding:6px 12px;font-size:12px;white-space:nowrap">Copy</button>
                </div>
                <div style="padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:600;font-size:13px;color:var(--text-secondary)">SHA-1</span>
                    <code id="sha1" style="font-size:12px;word-break:break-all;max-width:500px"></code>
                    <button class="btn btn-secondary" onclick="copyHash('sha1')" style="padding:6px 12px;font-size:12px;white-space:nowrap">Copy</button>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/app.js"></script>
<script>
async function generateHashes() {
    const text = document.getElementById('input').value;
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    
    const sha256Buffer = await crypto.subtle.digest('SHA-256', data);
    document.getElementById('sha256').textContent = Array.from(new Uint8Array(sha256Buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    
    const sha1Buffer = await crypto.subtle.digest('SHA-1', data);
    document.getElementById('sha1').textContent = Array.from(new Uint8Array(sha1Buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function copyHash(id) {
    navigator.clipboard.writeText(document.getElementById(id).textContent);
}
</script>
</body>
