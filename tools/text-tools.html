<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Tools — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="../" class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="7" fill="#0071E3"/>
                <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>FreeTools</span>
        </a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn" id="langBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="currentLang">EN</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button data-lang="en">English</button>
                    <button data-lang="ru">Русский</button>
                    <button data-lang="es">Español</button>
                    <button data-lang="de">Deutsch</button>
                    <button data-lang="fr">Français</button>
                    <button data-lang="pt">Português</button>
                    <button data-lang="ja">日本語</button>
                    <button data-lang="zh">中文</button>
                    <button data-lang="ko">한국어</button>
                    <button data-lang="ar">العربية</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="tool-page">
    <div class="tool-header">
        <h1>Text Tools</h1>
        <p>Transform your text in various ways</p>
    </div>
    <div class="tool-container">
        <div class="tool-panel">
            <label>Input Text</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>

        <div class="tool-panel">
            <label>Actions</label>
            <div class="btn-group" style="flex-wrap:wrap">
                <button class="btn btn-primary" onclick="toUpper()">UPPERCASE</button>
                <button class="btn btn-primary" onclick="toLower()">lowercase</button>
                <button class="btn btn-primary" onclick="toTitle()">Title Case</button>
                <button class="btn btn-primary" onclick="toSentence()">Sentence case</button>
                <button class="btn btn-primary" onclick="reverse()">Reverse</button>
                <button class="btn btn-primary" onclick="removeDupes()">Remove Duplicates</button>
                <button class="btn btn-primary" onclick="removeLines()">Remove Empty Lines</button>
                <button class="btn btn-primary" onclick="sortLines()">Sort Lines</button>
                <button class="btn btn-primary" onclick="trimLines()">Trim Whitespace</button>
                <button class="btn btn-primary" onclick="wordCount()">Word Count</button>
            </div>
        </div>

        <div class="tool-panel" id="statsPanel" style="display:none">
            <label>Statistics</label>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;text-align:center">
                <div>
                    <div style="font-size:24px;font-weight:700" id="charCount">0</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Characters</div>
                </div>
                <div>
                    <div style="font-size:24px;font-weight:700" id="wordCount">0</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Words</div>
                </div>
                <div>
                    <div style="font-size:24px;font-weight:700" id="lineCount">0</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Lines</div>
                </div>
            </div>
        </div>

        <div class="tool-panel">
            <label>Output</label>
            <div class="output-area" id="output"></div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="copyOutput()">Copy to Clipboard</button>
                <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
            </div>
        </div>
    </div>
</main>

<script src="../js/app.js"></script>
<script>
const input = document.getElementById('textInput');
const output = document.getElementById('output');
const statsPanel = document.getElementById('statsPanel');

input.addEventListener('input', updateStats);

function updateStats() {
    const text = input.value;
    document.getElementById('charCount').textContent = text.length;
    document.getElementById('wordCount').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('lineCount').textContent = text.split('\n').length;
    statsPanel.style.display = text ? 'block' : 'none';
}

function toUpper() { output.textContent = input.value.toUpperCase(); }
function toLower() { output.textContent = input.value.toLowerCase(); }
function toTitle() {
    output.textContent = input.value.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}
function toSentence() {
    output.textContent = input.value.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
}
function reverse() { output.textContent = input.value.split('').reverse().join(''); }
function removeDupes() {
    const lines = input.value.split('\n');
    output.textContent = [...new Set(lines)].join('\n');
}
function removeLines() {
    output.textContent = input.value.split('\n').filter(l => l.trim()).join('\n');
}
function sortLines() {
    output.textContent = input.value.split('\n').sort().join('\n');
}
function trimLines() {
    output.textContent = input.value.split('\n').map(l => l.trim()).join('\n');
}
function wordCount() { updateStats(); }
function copyOutput() {
    navigator.clipboard.writeText(output.textContent);
}
function clearAll() {
    input.value = '';
    output.textContent = '';
    statsPanel.style.display = 'none';
}
</script>
</body>
</html>
