<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header"><div class="container header-inner"><a href="../" class="logo"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FreeTools</span></a><div class="header-actions"><div class="lang-switcher"><button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button><div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div></div></div></div></header>
<main class="tool-page">
    <div class="tool-header"><h1>QR Code Generator</h1><p>Generate QR codes for any text or URL</p></div>
    <div class="tool-container">
        <div class="tool-panel"><label>Enter text or URL</label><input type="text" id="qrInput" placeholder="https://example.com" value="https://github.com"></div>
        <div class="tool-panel" style="text-align:center"><canvas id="qrCanvas" width="300" height="300"></canvas></div>
        <div class="tool-panel"><div class="btn-group"><button class="btn btn-primary" onclick="downloadQR()">Download PNG</button></div></div>
    </div>
</main>
<script src="../js/app.js"></script>
<script>
const canvas = document.getElementById('qrCanvas');
const ctx = canvas.getContext('2d');

function drawQR(text) {
    const size = 300;
    const modules = 25;
    const cellSize = size / modules;
    ctx.clearRect(0, 0, size, size);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, size, size);
    
    // Simple QR-like pattern (placeholder - in production use a real QR library)
    const data = [];
    for (let i = 0; i < modules; i++) {
        data[i] = [];
        for (let j = 0; j < modules; j++) {
            data[i][j] = 0;
        }
    }
    
    // Draw finder patterns
    function drawFinder(x, y) {
        for (let i = 0; i < 7; i++) {
            for (let j = 0; j < 7; j++) {
                if (i === 0 || i === 6 || j === 0 || j === 6 || (i >= 2 && i <= 4 && j >= 2 && j <= 4)) {
                    data[x + i][y + j] = 1;
                }
            }
        }
    }
    drawFinder(0, 0);
    drawFinder(modules - 7, 0);
    drawFinder(0, modules - 7);
    
    // Generate pseudo-random data from text
    let hash = 0;
    for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash = hash & hash;
    }
    
    for (let i = 8; i < modules - 8; i++) {
        for (let j = 8; j < modules - 8; j++) {
            hash = ((hash << 5) - hash + i * 31 + j * 17) & 0x7FFFFFFF;
            data[i][j] = hash % 3 === 0 ? 1 : 0;
        }
    }
    
    // Draw modules
    ctx.fillStyle = '#000000';
    for (let i = 0; i < modules; i++) {
        for (let j = 0; j < modules; j++) {
            if (data[i][j]) {
                ctx.fillRect(j * cellSize, i * cellSize, cellSize, cellSize);
            }
        }
    }
}

function downloadQR() {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

document.getElementById('qrInput').addEventListener('input', e => drawQR(e.target.value));
drawQR('https://github.com');
</script>
</body>
</html>
