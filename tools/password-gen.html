<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="../" class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>FreeTools</span>
        </a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button>
                <div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div>
            </div>
        </div>
    </div>
</header>

<main class="tool-page">
    <div class="tool-header"><h1>Password Generator</h1><p>Create strong, secure passwords</p></div>
    <div class="tool-container">
        <div class="tool-panel">
            <div style="display:flex;align-items:center;gap:12px">
                <input type="text" id="password" readonly style="font-size:20px;font-weight:700;letter-spacing:1px;text-align:center;flex:1">
                <button class="btn btn-primary" onclick="generate()" style="white-space:nowrap">Generate</button>
                <button class="btn btn-secondary" onclick="copyPass()">Copy</button>
            </div>
        </div>
        <div class="tool-panel">
            <label>Length: <span id="lenVal">16</span></label>
            <input type="range" id="length" min="4" max="64" value="16" style="width:100%" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
        </div>
        <div class="tool-panel">
            <label>Options</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="optUpper" checked onchange="generate()"> Uppercase (A-Z)</label>
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="optLower" checked onchange="generate()"> Lowercase (a-z)</label>
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="optNumbers" checked onchange="generate()"> Numbers (0-9)</label>
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="optSymbols" checked onchange="generate()"> Symbols (!@#$)</label>
            </div>
        </div>
    </div>
</main>

<script src="../js/app.js"></script>
<script>
const chars = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

function generate() {
    let pool = '';
    if (document.getElementById('optUpper').checked) pool += chars.upper;
    if (document.getElementById('optLower').checked) pool += chars.lower;
    if (document.getElementById('optNumbers').checked) pool += chars.numbers;
    if (document.getElementById('optSymbols').checked) pool += chars.symbols;
    if (!pool) pool = chars.lower;

    const len = document.getElementById('length').value;
    let pass = '';
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for (let i = 0; i < len; i++) pass += pool[arr[i] % pool.length];
    document.getElementById('password').value = pass;
}

function copyPass() {
    navigator.clipboard.writeText(document.getElementById('password').value);
}

generate();
</script>
</body>
</html>
