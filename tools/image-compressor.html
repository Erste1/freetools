<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="../" class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="7" fill="#0071E3"/>
                <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>FreeTools</span>
        </a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn" id="langBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="currentLang">EN</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button data-lang="en">English</button>
                    <button data-lang="ru">Русский</button>
                    <button data-lang="es">Español</button>
                    <button data-lang="de">Deutsch</button>
                    <button data-lang="fr">Français</button>
                    <button data-lang="pt">Português</button>
                    <button data-lang="ja">日本語</button>
                    <button data-lang="zh">中文</button>
                    <button data-lang="ko">한국어</button>
                    <button data-lang="ar">العربية</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="tool-page">
    <div class="tool-header">
        <h1>Image Compressor</h1>
        <p>Reduce image file size without losing visible quality</p>
    </div>
    <div class="tool-container">
        <div class="tool-panel">
            <div class="result-preview" id="previewArea">
                <p style="color: var(--text-secondary)" id="placeholder">Drop image here or click to upload</p>
                <img id="previewImg" style="display:none" alt="Preview">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            <div class="btn-group">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
                <button class="btn btn-secondary" id="downloadBtn" style="display:none">Download</button>
            </div>
        </div>

        <div class="tool-panel">
            <label>Quality (1-100)</label>
            <input type="range" id="quality" min="1" max="100" value="80" style="width:100%">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)">
                <span>Smaller file</span>
                <span id="qualityVal">80%</span>
                <span>Better quality</span>
            </div>
        </div>

        <div class="tool-panel" id="statsPanel" style="display:none">
            <label>Results</label>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">
                <div>
                    <div style="font-size:24px;font-weight:700" id="origSize">-</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Original</div>
                </div>
                <div>
                    <div style="font-size:24px;font-weight:700;color:var(--blue)" id="newSize">-</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Compressed</div>
                </div>
                <div>
                    <div style="font-size:24px;font-weight:700;color:#00B894" id="savings">-</div>
                    <div style="font-size:12px;color:var(--text-secondary)">Saved</div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="../js/app.js"></script>
<script>
let originalFile = null;

const previewArea = document.getElementById('previewArea');
const fileInput = document.getElementById('fileInput');
const previewImg = document.getElementById('previewImg');
const placeholder = document.getElementById('placeholder');
const qualitySlider = document.getElementById('quality');
const qualityVal = document.getElementById('qualityVal');
const downloadBtn = document.getElementById('downloadBtn');
const statsPanel = document.getElementById('statsPanel');

previewArea.addEventListener('click', () => fileInput.click());
previewArea.addEventListener('dragover', e => e.preventDefault());
previewArea.addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
});

qualitySlider.addEventListener('input', e => {
    qualityVal.textContent = e.target.value + '%';
    if (originalFile) compress();
});

function handleFile(file) {
    originalFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
        placeholder.style.display = 'none';
        compress();
    };
    reader.readAsDataURL(file);
}

function compress() {
    if (!originalFile) return;

    const img = new Image();
    img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const quality = qualitySlider.value / 100;
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            previewImg.src = url;
            downloadBtn.style.display = 'inline-flex';
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compressed_' + originalFile.name;
                a.click();
            };

            const origKB = (originalFile.size / 1024).toFixed(1);
            const newKB = (blob.size / 1024).toFixed(1);
            const saved = ((1 - blob.size / originalFile.size) * 100).toFixed(0);

            document.getElementById('origSize').textContent = origKB + ' KB';
            document.getElementById('newSize').textContent = newKB + ' KB';
            document.getElementById('savings').textContent = saved + '%';
            statsPanel.style.display = 'block';
        }, 'image/jpeg', quality);
    };
    img.src = URL.createObjectURL(originalFile);
}
</script>
</body>
</html>
