<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Calculator — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header"><div class="container header-inner"><a href="../" class="logo"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FreeTools</span></a><div class="header-actions"><div class="lang-switcher"><button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button><div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div></div></div></div></header>
<main class="tool-page">
    <div class="tool-header"><h1>Macro Calculator</h1><p>Calculate calories and macros for your diet</p></div>
    <div class="tool-container">
        <div class="tool-panel" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><label>Age</label><input type="number" id="age" value="25"></div>
            <div><label>Gender</label><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div>
            <div><label>Weight (kg)</label><input type="number" id="weight" value="70"></div>
            <div><label>Height (cm)</label><input type="number" id="height" value="175"></div>
            <div style="grid-column:span 2"><label>Activity Level</label><select id="activity"><option value="1.2">Sedentary (office job)</option><option value="1.375">Light (1-3 days/week)</option><option value="1.55" selected>Moderate (3-5 days/week)</option><option value="1.725">Active (6-7 days/week)</option><option value="1.9">Very Active (athlete)</option></select></div>
        </div>
        <div class="tool-panel"><div class="btn-group"><button class="btn btn-primary" onclick="calculate()">Calculate</button></div></div>
        <div class="tool-panel" id="results" style="display:none">
            <label>Your Daily Needs</label>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;text-align:center;margin-bottom:20px">
                <div style="padding:20px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:28px;font-weight:700;color:var(--blue)" id="tdee">-</div><div style="font-size:12px;color:var(--text-secondary)">Calories/day</div></div>
                <div style="padding:20px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:28px;font-weight:700" id="protein">-</div><div style="font-size:12px;color:var(--text-secondary)">Protein (g)</div></div>
                <div style="padding:20px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:28px;font-weight:700" id="carbs">-</div><div style="font-size:12px;color:var(--text-secondary)">Carbs (g)</div></div>
                <div style="padding:20px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:28px;font-weight:700" id="fat">-</div><div style="font-size:12px;color:var(--text-secondary)">Fat (g)</div></div>
            </div>
            <label>Goals</label>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">
                <div style="padding:16px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:700;color:#00B894" id="lose">-</div><div style="font-size:12px;color:var(--text-secondary)">Lose Weight</div></div>
                <div style="padding:16px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:700;color:#FDCB6E" id="maintain">-</div><div style="font-size:12px;color:var(--text-secondary)">Maintain</div></div>
                <div style="padding:16px;background:var(--bg);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:700;color:#E17055" id="gain">-</div><div style="font-size:12px;color:var(--text-secondary)">Gain Weight</div></div>
            </div>
        </div>
    </div>
</main>
<script src="../js/app.js"></script>
<script>
function calculate() {
    const age = parseInt(document.getElementById('age').value);
    const gender = document.getElementById('gender').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const activity = parseFloat(document.getElementById('activity').value);
    
    let bmr;
    if (gender === 'male') {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
    } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
    }
    
    const tdee = Math.round(bmr * activity);
    const protein = Math.round(weight * 2);
    const fat = Math.round(tdee * 0.3 / 9);
    const carbs = Math.round((tdee - protein * 4 - fat * 9) / 4);
    
    document.getElementById('tdee').textContent = tdee;
    document.getElementById('protein').textContent = protein + 'g';
    document.getElementById('carbs').textContent = carbs + 'g';
    document.getElementById('fat').textContent = fat + 'g';
    document.getElementById('lose').textContent = (tdee - 500) + ' kcal';
    document.getElementById('maintain').textContent = tdee + ' kcal';
    document.getElementById('gain').textContent = (tdee + 500) + ' kcal';
    document.getElementById('results').style.display = 'block';
}
calculate();
</script>
</body>
</html>
