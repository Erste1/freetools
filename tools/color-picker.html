<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker — FreeTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="../" class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="7" fill="#0071E3"/>
                <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>FreeTools</span>
        </a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn" id="langBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="currentLang">EN</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button data-lang="en">English</button>
                    <button data-lang="ru">Русский</button>
                    <button data-lang="es">Español</button>
                    <button data-lang="de">Deutsch</button>
                    <button data-lang="fr">Français</button>
                    <button data-lang="pt">Português</button>
                    <button data-lang="ja">日本語</button>
                    <button data-lang="zh">中文</button>
                    <button data-lang="ko">한국어</button>
                    <button data-lang="ar">العربية</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="tool-page">
    <div class="tool-header">
        <h1>Color Picker</h1>
        <p>Pick any color and get HEX, RGB, HSL values</p>
    </div>
    <div class="tool-container">
        <div class="tool-panel" style="text-align:center">
            <div id="colorPreview" style="width:100%;height:200px;border-radius:var(--radius-sm);background:#0071E3;margin-bottom:20px;cursor:pointer;transition:background 0.2s"></div>
            <input type="color" id="colorInput" value="#0071E3" style="position:absolute;opacity:0;pointer-events:none">
            <input type="text" id="hexInput" value="#0071E3" style="max-width:200px;text-align:center;font-size:18px;font-weight:600;margin:0 auto">
        </div>

        <div class="tool-panel">
            <label>Color Values</label>
            <div style="display:grid;gap:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm)">
                    <span style="font-weight:600;font-size:13px;color:var(--text-secondary)">HEX</span>
                    <code id="hexVal" style="font-size:15px;font-weight:600">#0071E3</code>
                    <button class="btn btn-secondary" onclick="copy('#hexVal')" style="padding:6px 12px;font-size:12px">Copy</button>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm)">
                    <span style="font-weight:600;font-size:13px;color:var(--text-secondary)">RGB</span>
                    <code id="rgbVal" style="font-size:15px">rgb(0, 113, 227)</code>
                    <button class="btn btn-secondary" onclick="copy('#rgbVal')" style="padding:6px 12px;font-size:12px">Copy</button>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm)">
                    <span style="font-weight:600;font-size:13px;color:var(--text-secondary)">HSL</span>
                    <code id="hslVal" style="font-size:15px">hsl(210, 100%, 44%)</code>
                    <button class="btn btn-secondary" onclick="copy('#hslVal')" style="padding:6px 12px;font-size:12px">Copy</button>
                </div>
            </div>
        </div>

        <div class="tool-panel">
            <label>Preset Colors</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px" id="presets"></div>
        </div>
    </div>
</main>

<script src="../js/app.js"></script>
<script>
const presets = [
    '#FF3B30','#FF9500','#FFCC00','#34C759','#007AFF','#5856D6','#AF52DE','#FF2D55',
    '#A2845E','#8E8E93','#000000','#FFFFFF','#F2F2F7','#3A3A3C','#48484A','#636366'
];

const colorPreview = document.getElementById('colorPreview');
const colorInput = document.getElementById('colorInput');
const hexInput = document.getElementById('hexInput');
const presetsDiv = document.getElementById('presets');

presets.forEach(c => {
    const el = document.createElement('div');
    el.style.cssText = `width:36px;height:36px;border-radius:8px;background:${c};cursor:pointer;border:2px solid ${c==='#FFFFFF'?'#D2D2D7':'transparent'};transition:transform 0.2s`;
    el.onclick = () => setColor(c);
    el.onmouseenter = () => el.style.transform = 'scale(1.15)';
    el.onmouseleave = () => el.style.transform = 'scale(1)';
    presetsDiv.appendChild(el);
});

colorPreview.addEventListener('click', () => colorInput.click());
colorInput.addEventListener('input', e => setColor(e.target.value));
hexInput.addEventListener('input', e => {
    if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) setColor(e.target.value);
});

function setColor(hex) {
    hex = hex.toUpperCase();
    colorPreview.style.background = hex;
    colorInput.value = hex;
    hexInput.value = hex;
    document.getElementById('hexVal').textContent = hex;

    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    document.getElementById('rgbVal').textContent = `rgb(${r}, ${g}, ${b})`;

    const [h,s,l] = rgbToHsl(r,g,b);
    document.getElementById('hslVal').textContent = `hsl(${h}, ${s}%, ${l}%)`;
}

function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
        const d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
            case r: h = ((g-b)/d + (g<b?6:0))/6; break;
            case g: h = ((b-r)/d + 2)/6; break;
            case b: h = ((r-g)/d + 4)/6; break;
        }
    }
    return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function copy(id) {
    const text = document.querySelector(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(id).parentElement.querySelector('button');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1000);
    });
}
</script>
</body>
</html>
