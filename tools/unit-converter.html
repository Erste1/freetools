<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Unit Converter Online — Length, Weight, Temperature | FreeTools</title>
    <meta name="description" content="Free online unit converter. Convert length, weight, temperature, speed, digital storage. Fast and easy.">
    <meta name="keywords" content="unit converter, length converter, weight converter, temperature converter, km to miles, kg to pounds, celsius to fahrenheit, online converter">
    <meta property="og:title" content="Free Unit Converter — Length, Weight, Temperature">
    <meta property="og:description" content="Convert between different units of measurement.">
    <meta property="og:url" content="https://erste1.github.io/freetools/tools/unit-converter.html">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://erste1.github.io/freetools/tools/unit-converter.html">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header"><div class="container header-inner"><a href="../" class="logo"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0071E3"/><path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FreeTools</span></a><div class="header-actions"><div class="lang-switcher"><button class="lang-btn" id="langBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="currentLang">EN</span></button><div class="lang-dropdown" id="langDropdown"><button data-lang="en">English</button><button data-lang="ru">Русский</button><button data-lang="es">Español</button><button data-lang="de">Deutsch</button><button data-lang="fr">Français</button><button data-lang="pt">Português</button><button data-lang="ja">日本語</button><button data-lang="zh">中文</button><button data-lang="ko">한국어</button><button data-lang="ar">العربية</button></div></div></div></div></header>
<main class="tool-page">
    <div class="tool-header"><h1>Unit Converter</h1><p>Convert between different units of measurement</p></div>
    <div class="tool-container">
        <div class="tool-panel">
            <label>Category</label>
            <select id="category" onchange="updateUnits()">
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temperature">Temperature</option>
                <option value="speed">Speed</option>
                <option value="data">Digital Storage</option>
            </select>
        </div>
        <div class="tool-panel" style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end">
            <div>
                <label>From</label>
                <input type="number" id="fromVal" value="1" oninput="convert()">
                <select id="fromUnit" onchange="convert()" style="margin-top:8px"></select>
            </div>
            <div style="font-size:24px;padding-bottom:20px">→</div>
            <div>
                <label>To</label>
                <input type="number" id="toVal" readonly style="background:var(--bg-dark)">
                <select id="toUnit" onchange="convert()" style="margin-top:8px"></select>
            </div>
        </div>
    </div>
</main>
<script src="../js/app.js"></script>
<script>
const units = {
    length: [
        {name:'Meters',factor:1},{name:'Kilometers',factor:1000},{name:'Centimeters',factor:0.01},
        {name:'Millimeters',factor:0.001},{name:'Miles',factor:1609.344},{name:'Yards',factor:0.9144},
        {name:'Feet',factor:0.3048},{name:'Inches',factor:0.0254}
    ],
    weight: [
        {name:'Kilograms',factor:1},{name:'Grams',factor:0.001},{name:'Milligrams',factor:0.000001},
        {name:'Pounds',factor:0.453592},{name:'Ounces',factor:0.0283495},{name:'Tons',factor:1000}
    ],
    temperature: [{name:'Celsius'},{name:'Fahrenheit'},{name:'Kelvin'}],
    speed: [
        {name:'m/s',factor:1},{name:'km/h',factor:0.277778},{name:'mph',factor:0.44704},
        {name:'Knots',factor:0.514444},{name:'Mach',factor:343}
    ],
    data: [
        {name:'Bytes',factor:1},{name:'KB',factor:1024},{name:'MB',factor:1048576},
        {name:'GB',factor:1073741824},{name:'TB',factor:1099511627776}
    ]
};

function updateUnits() {
    const cat = document.getElementById('category').value;
    const from = document.getElementById('fromUnit');
    const to = document.getElementById('toUnit');
    from.innerHTML = '';
    to.innerHTML = '';
    units[cat].forEach((u,i) => {
        from.innerHTML += `<option value="${i}">${u.name}</option>`;
        to.innerHTML += `<option value="${i}">${u.name}</option>`;
    });
    if (units[cat].length > 1) to.selectedIndex = 1;
    convert();
}

function convert() {
    const cat = document.getElementById('category').value;
    const val = parseFloat(document.getElementById('fromVal').value) || 0;
    const fi = document.getElementById('fromUnit').selectedIndex;
    const ti = document.getElementById('toUnit').selectedIndex;
    
    if (cat === 'temperature') {
        let celsius;
        if (fi === 0) celsius = val;
        else if (fi === 1) celsius = (val - 32) * 5/9;
        else celsius = val - 273.15;
        
        let result;
        if (ti === 0) result = celsius;
        else if (ti === 1) result = celsius * 9/5 + 32;
        else result = celsius + 273.15;
        document.getElementById('toVal').value = result.toFixed(4);
    } else {
        const baseVal = val * units[cat][fi].factor;
        const result = baseVal / units[cat][ti].factor;
        document.getElementById('toVal').value = result.toFixed(6);
    }
}

updateUnits();
</script>
</body>
</html>
